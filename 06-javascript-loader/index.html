<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <title>Loader</title>
    <style>
        .loader {
            height: 5px;
            width: 500px;
        }
        
        .red {
            background-color: red;
            height: 5px;
        }
        .text {
            color: rgb(168, 10, 10);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row align-items-center" style="height: 100vh;">
            <div class="col-12 text-center">
                <div class="d-inline-block px-3 text">
                    <p class="fs-3 fw-semibold">Lorem ipsum dolor sit amet</p>
                </div>
                <div class="row justify-content-center pt-4">
                    <div class="col-4 mt-4">
                        <button type="button" class="btn btn-success" data-bs-toggle="modal" data-bs-target="#modal1">Action</button>
                        <div class="modal"
                            id="modal1"
                            tabindex="-1"
                            data-bs-backdrop="static">
                            <div class="modal-dialog modal-dialog-centered">
                                <div class="modal-content">
                                    <div class="loader">
                                        <div class="red"></div>
                                    </div>
                                    <button id="hidden-btn" data-bs-dismiss="modal" style="display: none;"></button>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-4 mt-4">
                        <button type="button" class="btn btn-danger reset">Reset</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="index.js"></script>
</body>
</html>
